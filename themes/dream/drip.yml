  # Normal colors
  normal:
    black:   '0x151B30'
    red:     '0xFD5A96'
    green:   '0x4FFFCD'
    yellow:  '0xFFE1A6'
    blue:    '0x7DA6FF'
    magenta: '0xD69AFF'
    cyan:    '0x4DEAFF'
    white:   '0xD6E4FF'

  # Bright colors
  bright:
    black:   '0x434E73'
    red:     '0xFD5A96'
    green:   '0x4FFFCD'
    yellow:  '0xFFB894'
    blue:    '0x7DA6FF'
    magenta: '0xD69AFF'
    cyan:    '0x4DEAFF'
    white:   '0xD6E4FF'
