"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
follow_symlinks = false
command_timeout = 5000

format = """\
[\
$fill\
(\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$docker_context\
$kubernetes\
$shell\
$container\
$package\
)
$os\
$username\
$hostname\
$directory\
(\
${custom.git_remote_icon}\
${custom.git_remote_icon-pwsh}\
$git_branch\
$git_commit\
$git_status\
$git_metrics\
$git_state\
)\
(\
$fill\
)\
](bg:color_bg)
$status$character"""

right_format = """
$time"""

palette = "default"

[palettes.default]

rosewater = '#f5e0dc'
flamingo = '#f2adcd'
pink = '#f5c2e7'
mauve = '#cba6f7'
red = '#f38ba8'
maroon = '#eba0ac'
peach = '#fab387'
yellow = '#f9e2af'
green = '#a6e3a1'
teal = '#94e2d5'
sky = '#89dceb'
sapphire = '#74c7ec'
blue = '#89b4fa'
lavender = '#b4befe'
text = '#cdd6f4'
subtext1 = '#bac2de'
subtext0 = '#a6adc8'
overlay2 = '#9399b2'
overlay1 = '#7f849c'
overlay0 = '#6c7086'
surface2 = '#585b70'
surface1 = '#45475a'
surface0 = '#313244'
base = '#1e1e2e'
mantle = '#181825'
crust = '#11111b'

color_ok = 'bright-green'
color_danger = 'bright-red'
color_error = 'red'
color_caution = 'bright-yellow'
color_username = ''
color_bg = 'transparent'
color_directory = 'bright-blue'
color_directory_repo = 'bright-cyan'
color_directory_readonly = 'bright-black'
color_repo_bg = 'transparent'
color_git_bracket = '#74c7ec'
color_git_remote_symbol = '#74c7ec'
color_git_username = '#74c7ec'
color_git_remote_url = '#74c7ec'
color_git_remote_repo = '#89dceb'
color_git_equal = '#585b70'
color_env = '#7f849c'
color_package = '#fab387'
color_kubernetes = 'purple'
color_docker = 'blue'
color_shell = 'black'
color_container = ''
color_other = ''
color_time = '#b4befe'
color_duration = ''
color_os = 'blue'
color_git = 'cyan'
color_git_added = 'bright-green'
color_git_deleted = 'bright-red'
color_git_branch = '#cba6f7'
color_vimcmd_ok = 'black'
color_vimcmd_replace = 'yellow'
color_vimcmd_visual = 'purple'
color_btry_bg = '#181825'
color_fill = '#313244'
color_lua = '#74c7ec'
color_rust = '#EBA0AC'
color_node = 'bright-green'

[status]
disabled = true
format = '( [$status]($style))'
# format = '([$symbol( $common_meaning)( $signal_name)]($style))'
map_symbol = true
pipestatus = true
# symbol = ''
symbol = '󰅙'
# symbol = ''
success_symbol = ''
not_found_symbol = ''
not_executable_symbol = '󰜺'
# not_executable_symbol = '󰂭'
# sigint_symbol = ''
sigint_symbol = '󰐊'
signal_symbol = '󱐋'
style = 'fg:color_error'
recognize_signal_code = true

[time]
disabled = true
time_format = "%-I:%M%P"
style = "fg:color_time"
format = '( [$time]($style) )'
# format = '( [ $time]($style) )'

[cmd_duration]
format = "([](bright-black)[ $duration]($style))"
style = "bright-black"
disabled = true

[username]
style_user = 'white'
style_root = 'white bold'
format = '[$user]($style)'
disabled = true
show_always = true
# aliases = { "Administrator" = "admin" }

[hostname]
ssh_only = true
format = '([@](white)[$hostname](white))[:](bright-white dimmed)([$ssh_symbol ](style))'
style = "bright-white"
# trim_at = '.companyname.com'
trim_at = "-"
disabled = false
ssh_symbol = "  "

[fill]
disabled = false
# symbol = ''
# symbol = ''
# symbol = '󰖰'
# symbol = ''
# symbol = ''
# symbol = '󰍴'
# symbol = '─'
# symbol = '━'
# symbol = '═'
# symbol = '╌'
symbol = ' '
style = 'fg:color_fill bg:color_bg'

[directory]
before_repo_root_style = 'fg:color_directory'
style = 'fg:color_directory'
format = '[$path]($style)( [$read_only]($read_only_style))'
repo_root_style = 'fg:sky bold'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path](fg:sapphire)( [$read_only]($read_only_style))'
truncate_to_repo = false
truncation_length = 10
fish_style_pwd_dir_length = 1
# repo_root_style = "fg:color_directory_repo bold"
# read_only = ""
read_only = "󰌾"
home_symbol = "~"
use_os_path_sep = false
use_logical_path = false
read_only_style = 'fg:color_directory dimmed'
# truncation_symbol = "…/"

[git_branch]
symbol = ''
format = '( [$symbol$branch]($style) )'
style = 'fg:color_git_branch'

[git_commit]
style = "fg:color_git"
format = "([($tag)(@$hash)]($style) )"
commit_hash_length = 7
only_detached = true
tag_symbol = "󰓼 "
tag_disabled = false
disabled = false

# [git_status]
# format = '([$all_status$ahead_behind]($style))'
# style = 'bold fg:color_git'
# conflicted = '~${count}'
# stashed = '*${count}'
# ahead = '⇡${count}'
# behind = '⇣${count}'
# diverged = '⇠${behind_count} ⇢${ahead_count}'
# untracked = '?${count}'
# modified = '!${count}'
# staged = '+${count}'
# renamed = '»${count}'
# deleted = '󰖭${count}'

[git_status]
style = "fg:color_git"
format = '([$ahead_behind]($style) )([$all_status]($style) )'
stashed = "*${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
up_to_date = ""
diverged = "⇡${ahead_count}⇣${behind_count}"
conflicted = "=${count}"
deleted = "×${count}"
renamed = "»${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
ignore_submodules = false
disabled = false

[git_metrics]
format = '([([+$added]($added_style))([-$deleted]($deleted_style))](fg:color_git) )'
added_style = "fg:color_git_added"
deleted_style = "fg:color_git_deleted"
only_nonzero_diffs = true
disabled = false

[git_state]
style = "fg:color_danger"
format = '([$state( $progress_current/$progress_total)]($style bold) )'
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
disabled = false

