[custom.dirname]
description = "dir path"
when = '[ ! $STARSHIP_SHELL == "pwsh" ] && git rev-parse --show-toplevel 2>/dev/null'
command = """
dir=$(dirout -j $(git rev-parse --show-toplevel 2>/dev/null))
echo "$dir"
"""
style = "fg:color_directory"
format = '[$output]($style)'
shell = ["bash", "--noprofile", "--norc"]

[custom.dirname-pwsh]
description = "dir path"
when = 'git rev-parse --show-toplevel 2>$null'
command = """
$dir = (($PWD).Path).Replace((Get-Item $PWD).BaseName, "").Replace("$HOME", "~").Replace("\\", "/")
Write-Output $dir
"""
style = "fg:color_directory"
format = '[$output]($style)'
shell = ["pwsh", "-NoProfile", "-Command", "-"]

[custom.rwd]
description = "cwd"
when = true
command = "rwd"
style = "fg:color_directory"
format = '([$output[->](bright-black bold)]($style))'
shell = ["bash", "--noprofile", "--norc"]

[custom.git_remote_icon]
description = "Git host icon"
when = '[ ! $STARSHIP_SHELL == "pwsh" ] && git remote get-url origin 2>/dev/null'
command = """
echo "$(git-it -i)"
"""
format = '( [$output]($style))'
style = 'fg:color_git_branch'
shell = ["bash", "--noprofile", "--norc"]

[custom.git_remote_icon-pwsh]
disabled = false
description = "Git host icon"
shell = ["pwsh", "-NoProfile", "-Command", "-"]
when = true
command = """
$icon = (git-it -i 2>$null)
Write-Host $icon
"""
format = '( [$output]($style))'
style = 'fg:color_git_branch'
