[character]
success_symbol = '[](fg:color_ok bold)'
error_symbol = '[](fg:color_danger bold)'
vimcmd_symbol = '[󰅂](fg:color_vimcmd_ok)'
vimcmd_replace_one_symbol = '[󰅂](fg:color_vimcmd_replace)'
vimcmd_replace_symbol = '[󰅂](fg:color_vimcmd_replace)'
vimcmd_visual_symbol = '[󰅂](fg:color_vimcmd_visual)'
format = '$symbol '

[directory.substitutions]
# "~/Desktop" = " Desktop"
# "~/Videos" = " Videos"
# "~/Pictures" = " Pictures"
# "~/Music" = " Music"
# "~/Documents" = " Documents"
# "~/Downloads" = "󰇚 Downloads"
"C:/" = "/"
"/storage/emulated/0/Documents" = "~/Documents"

[custom.git_remote_icon]
description = "Git host icon"
when = 'git remote get-url origin 2>/dev/null'
command = """
echo "$(git-it -i)"
"""
format = '( [$output]($style))'
style = 'fg:color_git_branch'
# shell = ["bash"]

[custom.git_remote_icon-pwsh]
disabled = true
description = "Git host icon"
shell = ["pwsh", "-NoProfile", "-Command", "-"]
when = 'git remote get-url origin 2>$null'
command = """
git-it.ps1 -Iv 2>&1
"""
format = '[$output ]($style)'
style = 'fg:color_git_branch'
